name: CI/CD – AniVault API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── JOB 1: Valida o contrato OpenAPI com Spectral ───────────────────────────
  validar:
    name: Validar OpenAPI (Spectral)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Spectral CLI
        run: npm install -g @stoplight/spectral-cli

      - name: Criar ruleset do Spectral
        run: |
          cat <<'EOF' > .spectral.yaml
          extends: ["spectral:oas"]
          EOF

      - name: Executar validação Spectral
        run: spectral lint openapi.yaml --ruleset .spectral.yaml

  # ─── JOB 2: Gera documentação HTML com Redoc e publica no Pages ──────────────
  publicar-docs:
    name: Publicar Docs (Redoc → GitHub Pages)
    runs-on: ubuntu-latest
    needs: validar          # só roda se o job validar passar

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Redoc CLI
        run: npm install -g @redocly/cli

      - name: Gerar documentação HTML
        run: |
          mkdir -p docs
          redocly build-docs openapi.yaml --output docs/index.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload do artefato para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
